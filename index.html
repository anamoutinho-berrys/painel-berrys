<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berry's – Painel Interno</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/core.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-b">B</div>
    <div class="brand-txt">
      <div class="n">Berry's</div>
      <div class="s">Iced Food</div>
    </div>
  </div>
  <nav class="tabs-nav">
    <button class="tab-btn active" onclick="goTab('saldos',this)">💰 Saldos <span class="badge">LIVE</span></button>
    <button class="tab-btn" onclick="goTab('relatorio',this)">📈 Dash - Tempo Real <span class="badge">LIVE</span></button>
    <button class="tab-btn" onclick="goTab('dash',this)">📊 Acompanhamento</button>
    <button class="tab-btn" onclick="goTab('instagram',this)">📸 Instagram</button>
    <button class="tab-btn" onclick="goTab('criativos',this)">🎨 Planejamento de Criativos</button>
    <button class="tab-btn" onclick="goTab('links',this)">🔗 Central de Links</button>
    <button class="tab-btn" onclick="goTab('trafego-julho',this)">🗓️ Estrutura de Tráfego — Julho</button>
  </nav>
  <div class="srv-status"><div class="srv-dot"></div>API conectada</div>
</div>

<!-- Cada <div id="tab-*"> começa vazio: o conteúdo de tabs/<aba>.html é injetado
     sob demanda pelo loadTab() em core.js, na primeira vez que a aba é aberta. -->
<div id="tab-saldos" class="tab-page active"></div>
<div id="tab-relatorio" class="tab-page"></div>
<div id="tab-dash" class="tab-page"></div>
<div id="tab-instagram" class="tab-page"></div>
<div id="tab-criativos" class="tab-page"></div>
<div id="tab-links" class="tab-page"></div>
<div id="tab-trafego-julho" class="tab-page"></div>

<!-- Bibliotecas compartilhadas: sempre carregadas -->
<script src="assets/core.js"></script>
<script src="assets/objectives.js"></script>

<script>
// ============================================================================
// Loader de abas — SÓ mexa aqui se for mudar o mecanismo de troca de abas em
// si. Conteúdo/lógica de cada aba fica isolado em tabs/<aba>.html + .js.
// ============================================================================

// chave da aba (a mesma usada em goTab/onclick) -> nome-base do arquivo em tabs/
const TAB_FILE = {
  'saldos':        'saldos',
  'relatorio':      'relatorio',
  'dash':           'acompanhamento',
  'instagram':      'instagram',
  'criativos':      'criativos',
  'links':          'links',
  'trafego-julho':  'trafego',
};

const loadedTabs = new Set();

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const el = document.createElement('script');
    el.src = src;
    el.onload = resolve;
    el.onerror = () => reject(new Error('Falha ao carregar ' + src));
    document.body.appendChild(el);
  });
}

async function loadTab(key) {
  if (loadedTabs.has(key)) return;
  const file = TAB_FILE[key];
  const container = document.getElementById('tab-' + key);
  try {
    const html = await fetch(`tabs/${file}.html`).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    });
    container.innerHTML = html;
    await loadScript(`tabs/${file}.js`);
    loadedTabs.add(key);
    const initFn = window['init_' + file.replace(/-/g, '_')];
    if (typeof initFn === 'function') initFn();
  } catch (e) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:#e94560;font-weight:800;">
      ⚠️ Não foi possível carregar esta aba (${e.message}).<br>
      <span style="font-weight:600;font-size:12px;color:#999;">Isto acontece se o painel for aberto direto do arquivo (file://) —
      sirva a pasta por um servidor http (GitHub Pages, ou "python3 -m http.server").</span>
    </div>`;
    console.error('[loadTab]', key, e);
  }
}

async function goTab(name, btn) {
  if (!TAB_FILE[name]) name = 'saldos';
  document.querySelectorAll('.tab-page').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  await loadTab(name);
  document.getElementById('tab-' + name).classList.add('active');
  if (!btn) btn = document.querySelector(`[onclick="goTab('${name}',this)"]`);
  if (btn) btn.classList.add('active');
  if (history.replaceState) history.replaceState(null, '', '#' + name);
}

// Deep-link: abrir direto numa aba específica via #chave-da-aba na URL
// (ex.: index.html#criativos), pra poder mandar o link caindo direto nela.
document.addEventListener('DOMContentLoaded', () => {
  const key = location.hash.replace('#', '');
  goTab(TAB_FILE[key] ? key : 'saldos');
});
</script>
</body>
</html>
