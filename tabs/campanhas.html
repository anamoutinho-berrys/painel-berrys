  <div class="subheader">
    <div><div class="sh-title">Controle de Campanhas</div><div class="sh-sub">Status e métricas das campanhas ativas por unidade</div></div>
  </div>
  <div class="camp-filters">
    <label>📅 Período:</label>
    <select class="sel" id="camp-preset">
      <option value="this_month">Este mês</option>
      <option value="last_month">Mês passado</option>
      <option value="last_7d">Últimos 7 dias</option>
      <option value="last_30d">Últimos 30 dias</option>
    </select>
    <label>📍 Status:</label>
    <select class="sel" id="camp-status">
      <option value="all">Todos</option>
      <option value="ACTIVE">Ativas</option>
      <option value="PAUSED">Pausadas</option>
    </select>
    <button class="btn btn-dark" onclick="campFetch()">🔄 Atualizar</button>
    <div class="last-up" id="camp-last-up"></div>
  </div>
  <div class="camp-kpi-grid">
    <div class="ckpi"><div class="ck-lbl">Campanhas Ativas</div><div class="ck-val" id="ck-active">—</div></div>
    <div class="ckpi"><div class="ck-lbl">Pausadas</div>        <div class="ck-val" id="ck-paused">—</div></div>
    <div class="ckpi"><div class="ck-lbl">Investido</div>       <div class="ck-val" id="ck-spend">—</div></div>
    <div class="ckpi"><div class="ck-lbl">Impressões</div>      <div class="ck-val" id="ck-impr">—</div></div>
    <div class="ckpi"><div class="ck-lbl">Cliques</div>         <div class="ck-val" id="ck-clicks">—</div></div>
    <div class="ckpi"><div class="ck-lbl">CTR Médio</div>       <div class="ck-val" id="ck-ctr">—</div></div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Unidade</th><th>Campanha</th><th>Tipo</th><th>Status</th>
        <th class="r">Orçamento/dia</th><th class="r">Investido</th>
        <th class="r">Impressões</th><th class="r">CTR</th><th class="r">CPC</th>
      </tr></thead>
      <tbody id="camp-body">
        <tr><td colspan="9" style="text-align:center;padding:40px;color:#bbb;font-weight:700;">Clique em Atualizar para carregar as campanhas.</td></tr>
      </tbody>
    </table>
  </div>
